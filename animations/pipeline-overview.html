<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function init() {
  'use strict';
  const SVG_NS       = 'http://www.w3.org/2000/svg';
  const TRAVEL_SPEED = 280;   // SVG units / second
  const PKT_W = 14, PKT_H = 9;
  const HAIDIS_CX = 995;      // HAIDIS chevron centre x
  const SAGIPS_LEFT = 1140;   // SAGIPS box left border (SVG coords)
  const SLIDE       = 280;    // px HAIDIS+SAGIPS slide left on Phase 1→2
  const SLIDE2      = 260;    // additional slide on Phase 2→3
  let   haidisShift = 0;      // updated at transition; shifts effective centres

  // ── Phase definitions ──────────────────────────────────────────────
  const PHASES = [
    {
      glowId:  'glow-aiready',
      spawnX:  814,
      feedX1:  814,
      feedX2:  900,            // HAIDIS left edge (SVG, unshifted)
      color:   '#1a9060',
      label:   'Phase 1 \u2014 Training on AI-Ready Data',
      fadeOnLeave: ['grp-aiready','grp-addanal',
                    'arrow-add-ai','arrow-int-add']
    },
    {
      glowId:  'glow-intdata',
      spawnX:  525,
      feedX1:  525,
      feedX2:  900 - SLIDE,   // HAIDIS left edge after slide (620)
      color:   '#c89000',
      label:   'Phase 2 \u2014 Training on Intermediate Data Products',
      fadeOnLeave: ['grp-intdata','grp-calreco','arrow-cal-int','arrow-raw-cal']
    },
    {
      glowId:  'glow-raw',
      spawnX:  240,
      feedX1:  240,
      feedX2:  900 - SLIDE - SLIDE2,  // HAIDIS left edge after both slides (360)
      color:   '#cc3344',
      label:   'Phase 3 \u2014 Training directly on Raw Detector Data',
      fadeOnLeave: []
    }
  ];

  let currentPhase = 0;
  let spawnActive  = false;
  let spawnTimer   = null;

  const feedLine   = document.getElementById('feed-line');
  const phaseLabel = document.getElementById('phase-label');
  const packets    = document.getElementById('packets');

  // ── Continuous feed-line flow animation ───────────────────────────
  gsap.to(feedLine, {
    attr: { 'stroke-dashoffset': -20 },
    duration: 0.45,
    repeat: -1,
    ease: 'none'
  });

  // ── Packet factory ─────────────────────────────────────────────────
  function sendPacket(spawnX, color) {
    const g    = document.createElementNS(SVG_NS, 'g');
    const halo = document.createElementNS(SVG_NS, 'rect');
    const rect = document.createElementNS(SVG_NS, 'rect');

    // Halo — wider, semi-transparent
    halo.setAttribute('x',      spawnX - 4);
    halo.setAttribute('y',      405 - PKT_H - 4);
    halo.setAttribute('width',  PKT_W + 8);
    halo.setAttribute('height', PKT_H + 8);
    halo.setAttribute('rx',     4);
    halo.setAttribute('fill',   color);
    halo.setAttribute('opacity', '0.22');

    // Main packet
    rect.setAttribute('x',      spawnX);
    rect.setAttribute('y',      405 - PKT_H / 2);
    rect.setAttribute('width',  PKT_W);
    rect.setAttribute('height', PKT_H);
    rect.setAttribute('rx',     2);
    rect.setAttribute('fill',   color);

    g.appendChild(halo);
    g.appendChild(rect);
    packets.appendChild(g);

    // Leg 1: spawn → HAIDIS centre (account for visual shift)
    const dx1  = (HAIDIS_CX + haidisShift) - spawnX - PKT_W / 2;
    const dur1 = Math.max(dx1, 1) / TRAVEL_SPEED;

    gsap.to(g, {
      x: dx1,
      duration: dur1,
      ease: 'none',
      onComplete() {
        // Flash HAIDIS glow
        gsap.fromTo('#glow-haidis',
          { opacity: 0 },
          { opacity: 0.45, duration: 0.1, yoyo: true, repeat: 1 }
        );
        // Leg 2: HAIDIS centre → SAGIPS centre
        const dx2  = SAGIPS_LEFT - HAIDIS_CX;
        const dur2 = dx2 / TRAVEL_SPEED;
        gsap.to(g, {
          x: dx1 + dx2,
          duration: dur2,
          ease: 'none',
          onComplete() {
            // Flicker SAGIPS box
            gsap.fromTo('#sagips-box',
              { opacity: 1 },
              { opacity: 0.5, duration: 0.12, yoyo: true, repeat: 1 }
            );
            g.remove();
          }
        });
      }
    });
  }

  // ── Recurring train scheduler ──────────────────────────────────────
  function sendTrain() {
    if (!spawnActive) return;
    const phase = PHASES[currentPhase];
    for (let i = 0; i < 5; i++) {
      gsap.delayedCall(i * 0.18, () => {
        if (spawnActive) sendPacket(phase.spawnX, phase.color);
      });
    }
    spawnTimer = gsap.delayedCall(2.2, sendTrain);
  }

  // ── Activate a phase (glow + label + packet spawn) ─────────────────
  function startPhase(idx) {
    const phase = PHASES[idx];
    currentPhase = idx;

    // Glow on active source
    gsap.to('#' + phase.glowId, { opacity: 0.35, duration: 0.7 });

    // Phase label fade-in
    phaseLabel.textContent = phase.label;
    gsap.fromTo(phaseLabel, { opacity: 0 }, { opacity: 1, duration: 0.6 });

    // Start trains
    spawnActive = true;
    gsap.delayedCall(0.25, sendTrain);
  }

  // ── Transition: Phase 1 → Phase 2 at t = 8 s ──────────────────────
  function transitionTo2() {
    const prev = PHASES[0];
    const next = PHASES[1];

    // Stop new spawns; let in-flight packets finish naturally
    spawnActive = false;
    if (spawnTimer) { spawnTimer.kill(); spawnTimer = null; }

    // Fade out phase label
    gsap.to(phaseLabel, { opacity: 0, duration: 0.4 });

    // Dim active-source glow
    gsap.to('#' + prev.glowId, { opacity: 0, duration: 0.9 });

    // Fade pipeline nodes no longer needed
    prev.fadeOnLeave.forEach(id => {
      gsap.to('#' + id, { opacity: 0.12, duration: 1.0 });
    });

    // Slide HAIDIS + SAGIPS + connecting arrow left
    haidisShift = -SLIDE;
    gsap.to(['#grp-haidis', '#grp-sagips', '#arrow-hai-sag'], {
      x: -SLIDE, duration: 1.2, ease: 'power2.inOut', delay: 0.4
    });

    // Switch feed line: fade out → reposition → fade in
    const feedTl = gsap.timeline({ delay: 0.5 });
    feedTl.to(feedLine, { opacity: 0, duration: 0.3 });
    feedTl.call(() => {
      feedLine.setAttribute('x1',     next.feedX1);
      feedLine.setAttribute('x2',     next.feedX2);
      feedLine.setAttribute('stroke', next.color);
    });
    feedTl.to(feedLine, { opacity: 0.9, duration: 0.5 });

    // Start Phase 2 after transition settles
    gsap.delayedCall(2.2, () => startPhase(1));
  }

  // ── Transition: Phase 2 → Phase 3 at t = 18.5 s ──────────────────
  function transitionTo3() {
    const prev = PHASES[1];
    const next = PHASES[2];

    // Stop new spawns; let in-flight packets finish naturally
    spawnActive = false;
    if (spawnTimer) { spawnTimer.kill(); spawnTimer = null; }

    // Fade out phase label
    gsap.to(phaseLabel, { opacity: 0, duration: 0.4 });

    // Dim active-source glow
    gsap.to('#' + prev.glowId, { opacity: 0, duration: 0.9 });

    // Fade pipeline nodes no longer needed
    prev.fadeOnLeave.forEach(id => {
      gsap.to('#' + id, { opacity: 0.12, duration: 1.0 });
    });

    // Slide HAIDIS + SAGIPS + connecting arrow further left
    haidisShift = -(SLIDE + SLIDE2);
    gsap.to(['#grp-haidis', '#grp-sagips', '#arrow-hai-sag'], {
      x: -(SLIDE + SLIDE2), duration: 1.2, ease: 'power2.inOut', delay: 0.4
    });

    // Switch feed line: fade out → reposition → fade in
    const feedTl = gsap.timeline({ delay: 0.5 });
    feedTl.to(feedLine, { opacity: 0, duration: 0.3 });
    feedTl.call(() => {
      feedLine.setAttribute('x1',     next.feedX1);
      feedLine.setAttribute('x2',     next.feedX2);
      feedLine.setAttribute('stroke', next.color);
    });
    feedTl.to(feedLine, { opacity: 0.9, duration: 0.5 });

    // Start Phase 3 after transition settles
    gsap.delayedCall(2.2, () => startPhase(2));
  }

  // ── Boot ───────────────────────────────────────────────────────────
  startPhase(0);
  gsap.delayedCall(8.0,  transitionTo2);
  gsap.delayedCall(18.5, transitionTo3);

  // ── Frame timer ────────────────────────────────────────────────────
  const t0 = performance.now();
  (function tick() {
    const el = document.getElementById('frame-timer');
    if (el) el.textContent = 't=' + ((performance.now() - t0) / 1000).toFixed(1) + 's';
    requestAnimationFrame(tick);
  })();

})();
</script>
</body>
</html>
