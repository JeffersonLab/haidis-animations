  <text id="mlflow-version" x="1418" y="438" text-anchor="end" fill="#1a6040"
        font-family="'Courier New', monospace" font-size="11" font-weight="bold">v0</text>

  <text x="1308" y="456" fill="#4a8068" font-family="'Courier New', monospace" font-size="10">SAVES</text>
  <text id="mlflow-saves" x="1418" y="456" text-anchor="end" fill="#1a6040"
        font-family="'Courier New', monospace" font-size="11" font-weight="bold">0</text>
</g>

<!-- ── Packets layer (always on top) ── -->
<g id="packets"></g>


<!-- ── Legend (3 rows) ──
     Row pitch: 20px.  Icon centers: y=10, 30, 50.  Text baselines: y=14, 34, 54.
     Box: y=-2 .. y=62  (8px padding top & bottom).  Width covers longest right-col text. -->
<g transform="translate(36, 718)">
  <rect x="0" y="-2" width="440" height="84" rx="5" fill="#ffffff" stroke="#c8d8e8" stroke-width="1"
        filter="url(#shadow-node)"/>

  <!-- Row 1 (center y=13): data senders -->
  <rect x="8"  y="7" width="24" height="12" rx="2" fill="#0099cc"/>
  <text x="38" y="18" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">GlueX Data 1</text>
  <rect x="220" y="7" width="24" height="12" rx="2" fill="#e05820"/>
  <text x="250" y="18" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">GlueX Data 2</text>

  <!-- Row 2 (center y=37): ring weights + ready signal -->
  <polygon points="21,30 28,37 21,44 14,37" fill="#aa33dd"/>
  <text x="38" y="42" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">Model weights (ring)</text>
  <line x1="220" y1="37" x2="244" y2="37" stroke="#7090a8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="232" cy="37" r="4" fill="none" stroke="#7090a8" stroke-width="1.2"/>
  <text x="250" y="42" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">Ready signal</text>

  <!-- Row 3 (center y=63): ring arc + model snapshot -->
  <path d="M 14,54 C 28,54 28,68 14,68" fill="none" stroke="#9933bb" stroke-width="1.8"/>
  <text x="38" y="68" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">MPI Rank communications</text>
  <g transform="translate(228, 62)">
    <polygon points="-6,-7 4,-7 7,-3 7,7 -6,7" fill="#18b068"/>
    <polyline points="4,-7 4,-3 7,-3" fill="none" stroke="#f0fff4" stroke-width="0.9"/>
  </g>
  <line x1="236" y1="63" x2="244" y2="63" stroke="#1ab870" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="250" y="68" fill="#4a6080" font-size="11" font-family="'Courier New', monospace">Model snapshot → registry</text>
</g>

<!-- ── Frame timer ── -->
<text id="frame-counter" x="1404" y="800" text-anchor="end" fill="#8090a8"
      font-size="9" font-family="'Courier New', monospace">t=0.0s</text>

</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
'use strict';
const SVG_NS = 'http://www.w3.org/2000/svg';

const SENDERS = {
  s1: { color: '#0099cc', glowFilter: 'glow-cyan'   },
  s2: { color: '#e05820', glowFilter: 'glow-orange' },
};

const LINKS = {
  's1-lb': { x1: 204, y1: 210, x2: 488, y2: 325 },
  's2-lb': { x1: 204, y1: 510, x2: 488, y2: 395 },
  'lb-r1': { x1: 792, y1: 290, x2: 1076, y2:  93 },
  'lb-r2': { x1: 792, y1: 325, x2: 1076, y2: 227 },
  'lb-r3': { x1: 792, y1: 360, x2: 1076, y2: 360 },
  'lb-r4': { x1: 792, y1: 395, x2: 1076, y2: 493 },
  'lb-r5': { x1: 792, y1: 430, x2: 1076, y2: 627 },
};

const FEEDBACK_LINKS = [
  { x1: 1076, y1:  78, x2: 792, y2: 275 },
  { x1: 1076, y1: 212, x2: 792, y2: 310 },
  { x1: 1076, y1: 345, x2: 792, y2: 345 },
  { x1: 1076, y1: 479, x2: 792, y2: 380 },
  { x1: 1076, y1: 613, x2: 792, y2: 415 },
];

const BUFS = {
  r1: { barEl: null, pctEl: null, level: 0, maxW: 76 },
  r2: { barEl: null, pctEl: null, level: 0, maxW: 76 },
  r3: { barEl: null, pctEl: null, level: 0, maxW: 76 },
  r4: { barEl: null, pctEl: null, level: 0, maxW: 76 },
  r5: { barEl: null, pctEl: null, level: 0, maxW: 76 },
};

const packetsLayer = document.getElementById('packets');

let pktIn = 0, pktOut = 0;
const distCounts = { r1: 0, r2: 0, r3: 0, r4: 0, r5: 0 };
let startTime = null;

const ROUTING = {
  s1: ['r1', 'r2', 'r3', 'r4', 'r5'],
  s2: ['r3', 'r4', 'r5', 'r1', 'r2'],
};
const routingIdx = { s1: 0, s2: 0 };
function getNextReceiver(sid) {
  const list = ROUTING[sid];
  return list[(routingIdx[sid]++) % list.length];
}

// ─────────────────────────────────────────────────────
//  Data-packet helpers
// ─────────────────────────────────────────────────────
const PKT_W = 14, PKT_H = 9;
const TRAVEL_SPEED = 280;

function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function dur(x1, y1, x2, y2)  { return dist(x1, y1, x2, y2) / TRAVEL_SPEED; }

function makeDataPkt(cx, cy, color, filter) {
  const g = document.createElementNS(SVG_NS, 'g');

  // Soft halo behind the packet (lighter on light BG)
  const glow = document.createElementNS(SVG_NS, 'rect');
  Object.entries({
    width: PKT_W + 8, height: PKT_H + 8, rx: 4,
    x: cx - PKT_W / 2 - 4, y: cy - PKT_H / 2 - 4,
    fill: color, opacity: 0.25,
  }).forEach(([k, v]) => glow.setAttribute(k, v));
  g.appendChild(glow);

  const rect = document.createElementNS(SVG_NS, 'rect');
  Object.entries({
    width: PKT_W, height: PKT_H, rx: 2,
    x: cx - PKT_W / 2, y: cy - PKT_H / 2,
    fill: color, opacity: 1,
    filter: `url(#${filter})`,
  }).forEach(([k, v]) => rect.setAttribute(k, v));
  g.appendChild(rect);

  packetsLayer.appendChild(g);
  return { g, rect, glow };
}

function movePkt(p, cx, cy) {
  p.rect.setAttribute('x', cx - PKT_W / 2);
  p.rect.setAttribute('y', cy - PKT_H / 2);
  p.glow.setAttribute('x', cx - PKT_W / 2 - 4);
  p.glow.setAttribute('y', cy - PKT_H / 2 - 4);
}

function animateJourney(sid, rid, delay) {
  const s = LINKS[`${sid}-lb`];
  const d = LINKS[`lb-${rid}`];
  const { color, glowFilter } = SENDERS[sid];
  const dur1 = dur(s.x1, s.y1, s.x2, s.y2);
  const dur2 = dur(d.x1, d.y1, d.x2, d.y2);

  gsap.delayedCall(delay, () => {
    const p = makeDataPkt(s.x1, s.y1, color, glowFilter);

    gsap.to(p.rect, { attr: { x: s.x2 - PKT_W/2, y: s.y2 - PKT_H/2 }, duration: dur1, ease: 'none' });
    gsap.to(p.glow, {
      attr: { x: s.x2 - PKT_W/2 - 4, y: s.y2 - PKT_H/2 - 4 }, duration: dur1, ease: 'none',
      onComplete() {
        pktIn++;
        updateLBStats();
        flashLB();
        movePkt(p, d.x1, d.y1);

        gsap.to(p.rect, { attr: { x: d.x2 - PKT_W, y: d.y2 - PKT_H/2 }, duration: dur2, ease: 'none' });
        gsap.to(p.glow, {
          attr: { x: d.x2 - PKT_W - 4, y: d.y2 - PKT_H/2 - 4 }, duration: dur2, ease: 'none',
          onComplete() {
            pktOut++;
            distCounts[rid]++;
            updateLBStats();
            fillBuffer(rid, 9 + Math.random() * 5);
            flashWorker(rid);
            p.g.remove();
          },
        });
      },
    });
  });
}

function spawnTrain(sid) {
  const n   = 5 + Math.floor(Math.random() * 5);
  const rid = getNextReceiver(sid);
  for (let i = 0; i < n; i++) animateJourney(sid, rid, i * 0.11);
}

function scheduleSender(sid, firstDelay, interval) {
  const go = (d) => gsap.delayedCall(d, () => {
    spawnTrain(sid);
    go(interval + (Math.random() - 0.5) * 0.3);
  });
  go(firstDelay);
}

// ─────────────────────────────────────────────────────
//  LB display
// ─────────────────────────────────────────────────────
function updateLBStats() {
  document.getElementById('lb-pkt-in').textContent  = pktIn;
  document.getElementById('lb-pkt-out').textContent = pktOut;
  const total = Object.values(distCounts).reduce((a, b) => a + b, 0);
  if (total === 0) return;
  ['r1','r2','r3','r4','r5'].forEach(r => {
    const w = Math.round((distCounts[r] / total) * 238);
    gsap.to(document.getElementById(`dist-${r}`), { attr: { width: w }, duration: 0.6, ease: 'power2.out' });
  });
}

let lbBusy = false;
function flashLB() {
  if (lbBusy) return;
  lbBusy = true;
  const dot = document.getElementById('lb-status-dot');
  gsap.to(dot, { attr: { r: 7 }, fill: '#44cc88', duration: 0.08,
    onComplete: () => gsap.to(dot, { attr: { r: 5 }, fill: '#00aa55', duration: 0.18,
      onComplete: () => { lbBusy = false; } }) });
}

// ─────────────────────────────────────────────────────
//  Worker buffer bars
// ─────────────────────────────────────────────────────
function fillBuffer(rid, delta) {
  const b = BUFS[rid];
  b.level = Math.min(b.level + delta, 100);
  renderBuf(rid);
}

function drainBuffers() {
  Object.keys(BUFS).forEach(rid => {
    const b = BUFS[rid];
    if (b.level <= 0) return;
    b.level = Math.max(0, b.level - 1.6);
    renderBuf(rid);
  });
}

function renderBuf(rid) {
  const b = BUFS[rid];
  const w = Math.round((b.level / 100) * b.maxW);
  const c = b.level > 80 ? '#cc2020' : b.level > 50 ? '#d07010' : '#4a7ab0';
  gsap.to(b.barEl, { attr: { width: w }, duration: 0.25, ease: 'power1.out' });
  b.barEl.setAttribute('fill', c);
  b.pctEl.textContent = Math.round(b.level) + '%';
  b.pctEl.setAttribute('fill', c);
}

function flashWorker(rid) {
  const box = document.querySelector(`#node-${rid} rect`);
  const orig = box.getAttribute('stroke');
  gsap.to(box, { attr: { stroke: '#0099cc' }, duration: 0.06,
    onComplete: () => gsap.to(box, { attr: { stroke: orig }, duration: 0.25 }) });
}

// ─────────────────────────────────────────────────────
//  Feedback signals
// ─────────────────────────────────────────────────────
function schedFeedback(link, delay) {
  gsap.delayedCall(delay, () => {
    const c = document.createElementNS(SVG_NS, 'circle');
    Object.entries({ r: 4, cx: link.x1, cy: link.y1,
      fill: 'none', stroke: '#6090b8', 'stroke-width': 1.5, opacity: 0.75 })
      .forEach(([k, v]) => c.setAttribute(k, v));
    packetsLayer.appendChild(c);
    const d = dist(link.x1, link.y1, link.x2, link.y2) / (TRAVEL_SPEED * 0.75);
    gsap.to(c, { attr: { cx: link.x2, cy: link.y2 }, duration: d, ease: 'none',
      onComplete: () => c.remove() });
    schedFeedback(link, 1.2 + Math.random() * 0.9);
  });
}

// ─────────────────────────────────────────────────────
//  Ring animation (model-weight diamonds)
// ─────────────────────────────────────────────────────
const RING_SEGS = [
  { p0:{x:1216,y: 93}, p1:{x:1262,y: 93}, p2:{x:1262,y:227}, p3:{x:1216,y:227} },
  { p0:{x:1216,y:227}, p1:{x:1262,y:227}, p2:{x:1262,y:360}, p3:{x:1216,y:360} },
  { p0:{x:1216,y:360}, p1:{x:1262,y:360}, p2:{x:1262,y:493}, p3:{x:1216,y:493} },
  { p0:{x:1216,y:493}, p1:{x:1262,y:493}, p2:{x:1262,y:627}, p3:{x:1216,y:627} },
  { p0:{x:1216,y:627}, p1:{x:1265,y:660}, p2:{x:1265,y: 60}, p3:{x:1216,y: 93} },
];

function cubicBez(t, p0, p1, p2, p3) {
  const mt = 1 - t, mt2 = mt * mt, mt3 = mt2 * mt;
  const t2 = t * t,  t3 = t2 * t;
  return {
    x: mt3*p0.x + 3*mt2*t*p1.x + 3*mt*t2*p2.x + t3*p3.x,
    y: mt3*p0.y + 3*mt2*t*p1.y + 3*mt*t2*p2.y + t3*p3.y,
  };
}

function ringPos(ringT) {
  const n = RING_SEGS.length;
  const w = ((ringT % n) + n) % n;
  const seg = RING_SEGS[Math.floor(w)];
  return cubicBez(w - Math.floor(w), seg.p0, seg.p1, seg.p2, seg.p3);
}

const RING_DURATION = 5.0;
const RING_COLOR    = '#aa33dd';
const NUM_RING_PKTS = 4;
const DIAM_S        = 11;

function makeRingDiamond() {
  const g = document.createElementNS(SVG_NS, 'g');

  const glow = document.createElementNS(SVG_NS, 'rect');
  const gs = DIAM_S + 8;
  Object.entries({
    width: gs, height: gs, x: -gs/2, y: -gs/2, rx: 2,
    fill: RING_COLOR, opacity: 0.2, transform: 'rotate(45)',
  }).forEach(([k, v]) => glow.setAttribute(k, v));
  g.appendChild(glow);

  const body = document.createElementNS(SVG_NS, 'rect');
  Object.entries({
    width: DIAM_S, height: DIAM_S, x: -DIAM_S/2, y: -DIAM_S/2, rx: 1.5,
    fill: RING_COLOR, opacity: 1,
    transform: 'rotate(45)', filter: 'url(#glow-purple)',
  }).forEach(([k, v]) => body.setAttribute(k, v));
  g.appendChild(body);

  g.setAttribute('transform', 'translate(1216, 93)');
  packetsLayer.appendChild(g);
  return g;
}

function startRing() {
  for (let i = 0; i < NUM_RING_PKTS; i++) {
    const diamond = makeRingDiamond();
    const state = { t: (i / NUM_RING_PKTS) * RING_SEGS.length };
    gsap.to(state, {
      t: state.t + RING_SEGS.length,
      duration: RING_DURATION,
      ease: 'none',
      repeat: -1,
      onUpdate() {
        const { x, y } = ringPos(state.t);
        diamond.setAttribute('transform', `translate(${x.toFixed(1)}, ${y.toFixed(1)})`);
      },
    });
  }
}

// ─────────────────────────────────────────────────────
//  MLFlow model-snapshot animation
// ─────────────────────────────────────────────────────
const MLFLOW_CX = 1360, MLFLOW_CY = 400;
const WORKER_SAVE_POINTS = [
  { x: 1216, y:  93 },
  { x: 1216, y: 227 },
  { x: 1216, y: 360 },
  { x: 1216, y: 493 },
  { x: 1216, y: 627 },
];
let mlflowVersion = 0, mlflowSaves = 0;

function makeSnapshotPkt(wx, wy) {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${wx}, ${wy})`);

  // Soft halo
  const halo = document.createElementNS(SVG_NS, 'circle');
  Object.entries({ r: 11, cx: 0, cy: 0, fill: '#18b068', opacity: 0.15 })
    .forEach(([k, v]) => halo.setAttribute(k, v));
  g.appendChild(halo);

  // Page / checkpoint icon (rect with folded corner)
  const body = document.createElementNS(SVG_NS, 'polygon');
  body.setAttribute('points', '-5,-6 3,-6 6,-3 6,6 -5,6');
  body.setAttribute('fill', '#18b068');
  body.setAttribute('filter', 'url(#glow-green)');
  g.appendChild(body);

  const fold = document.createElementNS(SVG_NS, 'polyline');
  fold.setAttribute('points', '3,-6 3,-3 6,-3');
  fold.setAttribute('fill', 'none');
  fold.setAttribute('stroke', '#f0fff4');
  fold.setAttribute('stroke-width', '0.9');
  g.appendChild(fold);

  // Tiny lines to suggest data rows
  [[0], [2.5]].forEach(([dy]) => {
    const l = document.createElementNS(SVG_NS, 'line');
    Object.entries({ x1: -3, y1: dy, x2: 4, y2: dy,
      stroke: '#f0fff4', 'stroke-width': 0.65, opacity: 0.7 })
      .forEach(([k, v]) => l.setAttribute(k, v));
    g.appendChild(l);
  });

  packetsLayer.appendChild(g);
  return g;
}

function animateSnapshot(workerIdx) {
  const src = WORKER_SAVE_POINTS[workerIdx];
  const pkt = makeSnapshotPkt(src.x, src.y);

  // Quadratic bezier control point — arc above/below the direct line
  const cpx = (src.x + MLFLOW_CX) / 2 + 20;
  const cpy = (src.y + MLFLOW_CY) / 2 - 30;

  const state = { t: 0 };
  gsap.to(state, {
    t: 1,
    duration: 1.1,
    ease: 'power1.inOut',
    onUpdate() {
      const t = state.t, mt = 1 - t;
      const x = mt*mt*src.x + 2*mt*t*cpx + t*t*MLFLOW_CX;
      const y = mt*mt*src.y + 2*mt*t*cpy + t*t*MLFLOW_CY;
      pkt.setAttribute('transform', `translate(${x.toFixed(1)}, ${y.toFixed(1)})`);
    },
    onComplete() {
      mlflowSaves++;
      if (mlflowSaves % 3 === 0) mlflowVersion++;
      document.getElementById('mlflow-saves').textContent   = mlflowSaves;
      document.getElementById('mlflow-version').textContent = `v${mlflowVersion}`;
      flashMLFlow();
      pkt.remove();
    },
  });
}

let mlflowBusy = false;
function flashMLFlow() {
  if (mlflowBusy) return;
  mlflowBusy = true;
  const box = document.querySelector('#node-mlflow > rect');
  gsap.to(box, { attr: { stroke: '#40e090' }, duration: 0.1,
    onComplete: () => gsap.to(box, { attr: { stroke: '#1a9060' }, duration: 0.5,
      onComplete: () => { mlflowBusy = false; } }) });
}

function scheduleSnapshots() {
  // Stagger workers so saves arrive from different nodes over time
  [0, 1, 2, 3, 4].forEach((wIdx, i) => {
    const firstDelay = 2.0 + i * 0.7 + Math.random();
    const go = (delay) => gsap.delayedCall(delay, () => {
      animateSnapshot(wIdx);
      go(3.5 + Math.random() * 3.0);
    });
    go(firstDelay);
  });
}

// ─────────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────────
(function init() {
  ['r1','r2','r3','r4','r5'].forEach(r => {
    BUFS[r].barEl = document.getElementById(`buf-${r}`);
    BUFS[r].pctEl = document.getElementById(`buf-${r}-pct`);
  });

  scheduleSender('s1', 0.2, 2.0);
  scheduleSender('s2', 0.9, 2.2);
  setInterval(drainBuffers, 350);
  FEEDBACK_LINKS.forEach((lnk, i) => schedFeedback(lnk, 0.5 + i * 0.4));
  startRing();
  scheduleSnapshots();

  // Frame timer
  (function tick() {
    if (!startTime) startTime = performance.now();
    document.getElementById('frame-counter').textContent =
      `t=${((performance.now() - startTime) / 1000).toFixed(1)}s`;
    requestAnimationFrame(tick);
  })();
})();
</script>
</body>
